<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPERVORAX - Premium E-Books</title>
    <meta name="description" content="Buy premium e‑books and digital courses from HypervoraX. Business, tech, personal development, and more. Instant WhatsApp delivery.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --pink: #ec4899;
            --white: #ffffff;
            --dark: #0f172a;
            --gray: #64748b;
            --light: #f1f5f9;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); color: var(--dark); line-height: 1.6; padding-top: 80px; }
        header { background: linear-gradient(135deg, var(--dark) 0%, #1e1b4b 100%); color: white; height: 80px; display: flex; align-items: center; position: fixed; width: 100%; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; width: 100%; }
        nav { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.8rem; font-weight: 900; background: linear-gradient(135deg, var(--blue), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .nav-links { list-style: none; }
        .nav-links a { color: white; text-decoration: none; font-weight: 600; font-size: 1rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--blue); }
        .hero { background: linear-gradient(135deg, var(--dark) 0%, #1e1b4b 100%); color: white; padding: 5rem 1rem; text-align: center; border-radius: 0 0 50px 50px; }
        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; }
        .hero p { font-size: 1.1rem; color: #94a3b8; margin-bottom: 30px; }
        .cta-btn { display: inline-block; background: linear-gradient(135deg, var(--blue), var(--pink)); color: white; padding: 1rem 2.5rem; border-radius: 50px; text-decoration: none; font-weight: 700; transition: 0.3s; }
        .cta-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        .section-title { text-align: center; font-size: 2rem; margin: 4rem 0 1rem; font-weight: 800; color: var(--dark); }
        .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; padding: 2rem 0; }
        .book-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #eee; }
        .book-card:hover { transform: translateY(-10px); }
        .book-cover { height: 350px; overflow: hidden; background: #e2e8f0; }
        .book-cover img { width: 100%; height: 100%; object-fit: cover; }
        .book-info { padding: 1.5rem; }
        .book-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--light); padding-top: 1rem; margin-top: 1rem; }
        .buy-btn { background: var(--dark); color: white; padding: 0.6rem 1.2rem; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 0.9rem; }
        .loading, .error, .empty { text-align: center; padding: 40px; font-weight: bold; }
        .error { color: #ef4444; }
        .empty { color: var(--gray); }
        /* Description toggle styles */
        .book-description-wrapper {
            margin: 8px 0;
        }
        .book-description {
            font-size: 0.85rem;
            color: var(--gray);
            line-height: 1.4;
            margin: 0;
        }
        .book-description.truncated {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .book-description.expanded {
            -webkit-line-clamp: unset;
            display: block;
        }
        .see-more-btn {
            background: none;
            border: none;
            color: var(--blue);
            cursor: pointer;
            font-size: 0.75rem;
            padding: 4px 0 0 0;
            margin-top: 4px;
            display: inline-block;
            font-weight: 500;
        }
        .see-more-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">HYPERVORAX</a>
                <ul class="nav-links">
                    <li><a href="books.html">Library</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Digital Excellence.</h1>
            <p>Premium knowledge and high-impact digital courses at your fingertips.</p>
            <a href="books.html" class="cta-btn">Browse Library</a>
        </div>
    </section>

    <div class="container">
        <h2 class="section-title">Latest Releases</h2>
        <div id="loading" class="loading">Fetching library...</div>
        <div id="error" class="error" style="display:none;"></div>
        <div class="books-grid" id="featuredBooks"></div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const gridEl = document.getElementById('featuredBooks');

        const q = query(collection(db, "books"), orderBy("timestamp", "desc"), limit(3));
        onSnapshot(q, (snap) => {
            loadingEl.style.display = 'none';
            if (snap.empty) {
                gridEl.innerHTML = '<div class="empty">No books available yet. Check back soon!</div>';
                return;
            }
            gridEl.innerHTML = snap.docs.map(doc => {
                const book = doc.data();
                const safeTitle = escapeHtml(book.title);
                const safeCategory = escapeHtml(book.category);
                const safePrice = escapeHtml(book.price);
                const safeDescription = book.description ? escapeHtml(book.description) : '';
                const coverUrl = book.coverUrl;
                const whatsappUrl = `https://wa.me/2348115422216?text=${encodeURIComponent(`Hello HypervoraX, I want to buy "${book.title}". After payment, please send the Google Drive link.`)}`;
                // generate description html with toggle link if description exists and is long enough
                let descriptionHtml = '';
                if (safeDescription) {
                    const showToggle = safeDescription.length > 100; // only show toggle if description is long
                    descriptionHtml = `
                        <div class="book-description-wrapper">
                            <p class="book-description truncated" id="desc-${doc.id}">${safeDescription}</p>
                            ${showToggle ? `<button class="see-more-btn" data-id="${doc.id}">see more</button>` : ''}
                        </div>
                    `;
                }
                return `
                    <div class="book-card" data-id="${doc.id}">
                        <div class="book-cover"><img src="${coverUrl}" onerror="this.src='https://via.placeholder.com/300x400?text=HypervoraX'"></div>
                        <div class="book-info">
                            <small style="color:var(--purple); font-weight:bold; text-transform:uppercase;">${safeCategory}</small>
                            <h3 style="margin:5px 0;">${safeTitle}</h3>
                            ${descriptionHtml}
                            <div class="book-footer">
                                <span style="font-size:1.4rem; font-weight:900;">${safePrice}</span>
                                <a href="${whatsappUrl}" class="buy-btn">Get It</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            // Attach toggle listeners using event delegation on grid
            gridEl.addEventListener('click', (e) => {
                const btn = e.target.closest('.see-more-btn');
                if (!btn) return;
                const id = btn.getAttribute('data-id');
                const descPara = document.getElementById(`desc-${id}`);
                if (descPara) {
                    const isTruncated = descPara.classList.contains('truncated');
                    if (isTruncated) {
                        descPara.classList.remove('truncated');
                        descPara.classList.add('expanded');
                        btn.textContent = 'see less';
                    } else {
                        descPara.classList.add('truncated');
                        descPara.classList.remove('expanded');
                        btn.textContent = 'see more';
                    }
                }
            });
        }, (error) => {
            loadingEl.style.display = 'none';
            errorEl.style.display = 'block';
            errorEl.textContent = 'Failed to load books: ' + error.message;
        });
    </script>
</body>
</html>
