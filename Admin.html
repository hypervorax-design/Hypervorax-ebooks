<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HypervoraX Control Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --blue: #3b82f6; --purple: #8b5cf6; --pink: #ec4899; --dark: #0f172a; --gray: #64748b; --light: #f1f5f9; }
        body { background: #0f172a; font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .login-box, .admin-box { background: #1e293b; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid #334155; margin: 20px auto; }
        .login-box h2, .admin-box h2 { text-align: center; color: var(--purple); margin-bottom: 15px; }
        .login-box input, .login-box button, .admin-box input, .admin-box select, .admin-box textarea, .admin-box button {
            width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #334155;
            background: #0f172a; color: white; outline: none;
        }
        .admin-box textarea { resize: vertical; min-height: 80px; font-family: inherit; }
        .login-box button, .admin-box button { background: linear-gradient(90deg, var(--blue), var(--purple)); border: none; font-weight: bold; cursor: pointer; }
        .logout-btn { background: #ef4444; border: none; padding: 8px 16px; border-radius: 8px; color: white; cursor: pointer; margin-bottom: 20px; }
        .inventory-section { width: 100%; max-width: 400px; margin: 30px auto; }
        .inventory-section h3 { color: white; margin-bottom: 10px; }
        .inventory-item { background: #1e293b; padding: 12px; margin-bottom: 8px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; word-break: break-word; gap: 8px; }
        .inventory-item span { flex: 1; font-size: 0.9rem; }
        .del-btn, .edit-btn { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; margin-left: 5px; white-space: nowrap; }
        .edit-btn { background: #3b82f6; }
        .loading, .error { text-align: center; color: var(--gray); padding: 20px; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <div id="loginContainer" style="display:none;">
        <div class="login-box">
            <h2>Admin Login</h2>
            <input type="email" id="email" placeholder="Email" autocomplete="email">
            <input type="password" id="password" placeholder="Password" autocomplete="current-password">
            <button id="loginBtn">Login</button>
            <div id="loginError" class="error" style="display:none;"></div>
        </div>
    </div>

    <div id="adminContainer" style="display:none;">
        <button class="logout-btn" id="logoutBtn">Logout</button>
        <div class="admin-box">
            <h2>HypervoraX Admin</h2>
            <label>Book Title *</label>
            <input type="text" id="title" placeholder="e.g. Beyond the Stars">
            
            <label>Price *</label>
            <input type="text" id="price" placeholder="e.g. ₦3,000">
            
            <label>Category *</label>
            <select id="category">
                <option value="" disabled selected>Choose a genre...</option>
                <option value="Business">Business</option>
                <option value="Courses">Digital Courses</option>
                <option value="Personal Development">Personal Development</option>
                <option value="Tech">Tech</option>
                <option value="Marketing">Marketing</option>
                <option value="Fantasy">Fantasy</option>
                <option value="Romance">Romance</option>
                <option value="Mystery">Mystery</option>
                <option value="Sci-Fi">Sci-Fi</option>
                <option value="History">History</option>
                <option value="Action">Action</option>
                <option value="Young Adult">Young Adult</option>
            </select>
            
            <label>Author (optional)</label>
            <input type="text" id="author" placeholder="e.g. Jane Doe">
            
            <label>Description (short summary)</label>
            <textarea id="description" rows="3" placeholder="Write a brief description of the book..."></textarea>
            
            <label>Image Link (Must start with http) *</label>
            <input type="text" id="coverUrl" placeholder="Paste direct image URL">
            
            <button id="saveBtn">Publish to Store</button>
        </div>

        <div class="inventory-section">
            <h3>Live Inventory</h3>
            <div id="loadingStatus" class="loading">Fetching data...</div>
            <div id="inventory"></div>
        </div>
    </div>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        import { signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        const loginContainer = document.getElementById('loginContainer');
        const adminContainer = document.getElementById('adminContainer');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginError = document.getElementById('loginError');
        const saveBtn = document.getElementById('saveBtn');
        const titleInput = document.getElementById('title');
        const priceInput = document.getElementById('price');
        const categorySelect = document.getElementById('category');
        const authorInput = document.getElementById('author');
        const descriptionInput = document.getElementById('description');
        const coverUrlInput = document.getElementById('coverUrl');
        const loadingStatus = document.getElementById('loadingStatus');
        const inventoryDiv = document.getElementById('inventory');

        let unsubscribeInventory = null;
        let editingId = null;   // if not null, we are editing this document

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function resetForm() {
            titleInput.value = '';
            priceInput.value = '';
            categorySelect.value = '';
            authorInput.value = '';
            descriptionInput.value = '';
            coverUrlInput.value = '';
            editingId = null;
            saveBtn.textContent = 'Publish to Store';   // reset button text
        }

        function fillForm(book) {
            titleInput.value = book.title || '';
            priceInput.value = book.price || '';
            categorySelect.value = book.category || '';
            authorInput.value = book.author || '';
            descriptionInput.value = book.description || '';
            coverUrlInput.value = book.coverUrl || '';
        }

        function loadInventory() {
            if (unsubscribeInventory) {
                unsubscribeInventory();
                unsubscribeInventory = null;
            }
            const q = query(collection(db, "books"), orderBy("timestamp", "desc"));
            unsubscribeInventory = onSnapshot(q, (snap) => {
                loadingStatus.style.display = 'none';
                inventoryDiv.innerHTML = snap.docs.map(d => {
                    const book = d.data();
                    const safeTitle = escapeHtml(book.title);
                    const safeAuthor = book.author ? escapeHtml(book.author) : '';
                    const displayText = safeAuthor ? `${safeTitle} (by ${safeAuthor})` : safeTitle;
                    return `
                        <div class="inventory-item" data-id="${d.id}">
                            <span>${displayText}</span>
                            <div>
                                <button class="edit-btn" data-id="${d.id}">✏️ Edit</button>
                                <button class="del-btn" data-id="${d.id}">Remove</button>
                            </div>
                        </div>
                    `;
                }).join('');

                // Delete buttons
                document.querySelectorAll('.del-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = btn.getAttribute('data-id');
                        if (confirm("Permanently delete this book?")) {
                            try {
                                await deleteDoc(doc(db, "books", id));
                                alert("🗑️ Deleted successfully");
                                if (editingId === id) resetForm(); // clear edit if we deleted it
                            } catch (e) {
                                alert("Delete failed: " + e.message);
                            }
                        }
                    });
                });

                // Edit buttons
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const id = btn.getAttribute('data-id');
                        try {
                            const docRef = doc(db, "books", id);
                            const docSnap = await getDoc(docRef);
                            if (docSnap.exists()) {
                                fillForm(docSnap.data());
                                editingId = id;
                                saveBtn.textContent = 'Update Book';
                            } else {
                                alert("Book not found");
                            }
                        } catch (e) {
                            alert("Error loading book: " + e.message);
                        }
                    });
                });
            }, (error) => {
                loadingStatus.style.display = 'none';
                inventoryDiv.innerHTML = `<div class="error">Error loading books: ${error.message}</div>`;
            });
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginContainer.style.display = 'none';
                adminContainer.style.display = 'block';
                loadInventory();
            } else {
                loginContainer.style.display = 'block';
                adminContainer.style.display = 'none';
                if (inventoryDiv) inventoryDiv.innerHTML = '';
                if (unsubscribeInventory) {
                    unsubscribeInventory();
                    unsubscribeInventory = null;
                }
            }
        });

        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            if (!email || !password) {
                loginError.textContent = "Please enter email and password.";
                loginError.style.display = 'block';
                return;
            }
            loginError.style.display = 'none';
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                loginError.textContent = "Login failed: " + error.message;
                loginError.style.display = 'block';
            }
        });

        logoutBtn.addEventListener('click', async () => {
            await signOut(auth);
            resetForm();
        });

        saveBtn.addEventListener('click', async () => {
            const title = titleInput.value.trim();
            const price = priceInput.value.trim();
            const category = categorySelect.value;
            const author = authorInput.value.trim();
            const description = descriptionInput.value.trim();
            const coverUrl = coverUrlInput.value.trim();

            if (!title || !price || !category || !coverUrl) {
                alert("Title, Price, Category, and Image Link are required!");
                return;
            }
            if (!coverUrl.startsWith('http')) {
                alert("Image URL must start with http:// or https://");
                return;
            }

            try {
                if (editingId) {
                    // Update existing book
                    await updateDoc(doc(db, "books", editingId), {
                        title, price, category, author, description, coverUrl,
                        timestamp: Date.now()   // update timestamp
                    });
                    alert("✅ Book updated!");
                } else {
                    // Add new book
                    await addDoc(collection(db, "books"), {
                        title, price, category, author, description, coverUrl,
                        timestamp: Date.now()
                    });
                    alert("✅ Book added!");
                }
                resetForm();
            } catch (error) {
                alert("Error: " + error.message);
            }
        });
    </script>
</body>
</html>
