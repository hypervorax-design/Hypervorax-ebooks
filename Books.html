<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library | HYPERVORAX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --blue: #3b82f6; --purple: #8b5cf6; --pink: #ec4899; --dark: #0f172a; --gray: #64748b; --light: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); padding-top: 80px; }
        header { background: var(--dark); color: white; height: 80px; display: flex; align-items: center; position: fixed; width: 100%; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; width: 100%; }
        nav { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.8rem; font-weight: 900; background: linear-gradient(135deg, var(--blue), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .nav-links { list-style: none; }
        .nav-links a { color: white; text-decoration: none; font-weight: 600; font-size: 1rem; transition: 0.3s; }

        .filter-section { padding: 1rem 0; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 80px; z-index: 100; }
        .filter-container { display: flex; gap: 0.8rem; overflow-x: auto; padding: 0.5rem 1.5rem; scrollbar-width: none; max-width: 1200px; margin: 0 auto; }
        .filter-btn { padding: 0.6rem 1.2rem; border: 1.5px solid var(--purple); background: white; color: var(--purple); border-radius: 50px; cursor: pointer; white-space: nowrap; font-weight: 600; font-size: 0.85rem; }
        .filter-btn.active { background: var(--purple); color: white; }

        .search-section { background: white; padding: 1rem 1.5rem; border-bottom: 1px solid #ddd; }
        .search-container { max-width: 1200px; margin: 0 auto; }
        #searchInput { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 30px; font-size: 1rem; outline: none; }

        .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 2rem; padding: 2rem 1.5rem; max-width: 1200px; margin: 0 auto; }
        .book-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; transition: 0.3s; }
        .book-cover { height: 300px; overflow: hidden; background: #e2e8f0; }
        .book-cover img { width: 100%; height: 100%; object-fit: cover; }
        .book-info { padding: 1.2rem; }
        .buy-btn { background: var(--blue); color: white; padding: 0.7rem; border-radius: 10px; text-decoration: none; display: block; text-align: center; margin-top: 10px; font-weight: bold; }
        .loading, .error, .empty { text-align: center; padding: 40px; font-weight: bold; }
        .error { color: #ef4444; }
        .empty { color: var(--gray); }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">HYPERVORAX</a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                </ul>
            </nav>
        </div>
    </header>
    
    <div class="search-section">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="🔍 Search by title, category, or price...">
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-container" id="filterContainer">
            <!-- Filters will be generated dynamically -->
        </div>
    </div>

    <div id="loading" class="loading">Syncing Library...</div>
    <div id="error" class="error" style="display:none;"></div>
    <div class="books-grid" id="booksGrid"></div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        let allBooks = [];
        let currentFilter = 'all';
        let searchTerm = '';

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function filterAndRender() {
            let filtered = allBooks;
            if (currentFilter !== 'all') {
                filtered = filtered.filter(b => b.category && b.category.toLowerCase() === currentFilter.toLowerCase());
            }
            if (searchTerm.trim() !== '') {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(b => 
                    (b.title && b.title.toLowerCase().includes(term)) ||
                    (b.category && b.category.toLowerCase().includes(term)) ||
                    (b.price && b.price.toLowerCase().includes(term))
                );
            }
            const gridEl = document.getElementById('booksGrid');
            if (filtered.length === 0) {
                gridEl.innerHTML = '<div class="empty">No books match your selection.</div>';
                return;
            }
            gridEl.innerHTML = filtered.map(book => {
                const safeTitle = escapeHtml(book.title);
                const safeCategory = escapeHtml(book.category);
                const safePrice = escapeHtml(book.price);
                const coverUrl = book.coverUrl;
                const whatsappUrl = `https://wa.me/2348115422216?text=${encodeURIComponent(`Hello HypervoraX, I want to buy "${book.title}".`)}`;
                return `
                    <div class="book-card">
                        <div class="book-cover"><img src="${coverUrl}" onerror="this.src='https://via.placeholder.com/300x400?text=No+Cover'"></div>
                        <div class="book-info">
                            <small style="color:var(--purple); font-weight:bold;">${safeCategory}</small>
                            <h3 style="margin:5px 0; font-size:1.1rem;">${safeTitle}</h3>
                            <strong>${safePrice}</strong>
                            <a href="${whatsappUrl}" class="buy-btn">Buy Now</a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function generateFilters(books) {
            const categories = new Set();
            books.forEach(book => {
                if (book.category) categories.add(book.category);
            });
            const sortedCategories = Array.from(categories).sort();
            const filterContainer = document.getElementById('filterContainer');
            filterContainer.innerHTML = `
                <button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" data-category="all">All</button>
                ${sortedCategories.map(cat => `
                    <button class="filter-btn ${currentFilter === cat ? 'active' : ''}" data-category="${cat}">${escapeHtml(cat)}</button>
                `).join('')}
            `;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const cat = btn.getAttribute('data-category');
                    currentFilter = cat;
                    generateFilters(allBooks); // refresh active state
                    filterAndRender();
                });
            });
        }

        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const q = query(collection(db, "books"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            loadingEl.style.display = 'none';
            allBooks = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            generateFilters(allBooks);
            filterAndRender();
        }, (error) => {
            loadingEl.style.display = 'none';
            errorEl.style.display = 'block';
            errorEl.textContent = 'Failed to load books: ' + error.message;
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            filterAndRender();
        });
    </script>
</body>
</html>
